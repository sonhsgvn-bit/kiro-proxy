# Coolify copy-paste deployment for the prebuilt public image.
#
# Prerequisites before using this file:
# 1. Build and push your image:
#    docker build -t ghcr.io/tanu360/kiro-reverse-api:latest .
#    docker push ghcr.io/tanu360/kiro-reverse-api:latest
# 2. Or pin a different image by setting KIRO_PROXY_IMAGE in Coolify env.

services:
  kiro-proxy:
    image: ${KIRO_PROXY_IMAGE:-ghcr.io/tanu360/kiro-reverse-api:latest}
    pull_policy: always
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      CONFIG_PATH: ${CONFIG_PATH:-/app/data/config.json}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Seed the admin password from Coolify's generated password.
      # Outside Coolify, this falls back to the app's existing default.
      ADMIN_PASSWORD: ${SERVICE_PASSWORD_KIRO_PROXY:-changeme}

      # Coolify exposes the public URL/FQDN for the service on port 8080.
      SERVICE_FQDN_KIRO_PROXY_8080: /
    volumes:
      - kiro-proxy-data:/app/data
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  kiro-proxy-data:
