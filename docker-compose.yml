services:
  kiro-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # No host port binding under Coolify: Traefik routes the FQDN to the
    # container's internal port 8080 (see SERVICE_FQDN_KIRO_PROXY_8080).
    expose:
      - "8080"
    # Enterprise SSO (Microsoft 365) callback.
    #
    # The hosted-portal sign-in always redirects the browser to the fixed
    # http://localhost:3128 (that redirect_uri is pre-registered by Kiro/Azure
    # and cannot be changed to the Coolify domain). So the browser that finishes
    # the Microsoft login must reach THIS container on localhost:3128.
    #
    # This publishes 3128 on the VPS loopback only (127.0.0.1) — never on the
    # public interface — so the callback is not exposed to the internet. To run
    # the login, open an SSH tunnel from your laptop:
    #
    #     ssh -L 3128:localhost:3128 user@<VPS-IP>
    #
    # then, with the tunnel open, use the admin panel (via the Coolify domain) ->
    # Add account -> Microsoft 365 -> Start Login. The callback to localhost:3128
    # travels laptop -> SSH -> VPS loopback -> container, and the token returns.
    # Close the tunnel when done; refresh afterwards goes straight to Microsoft
    # and no longer needs this port.
    ports:
      - "127.0.0.1:3128:3128"
    environment:
      DATA_DIR: ${DATA_DIR:-/app/state}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ADMIN_PASSWORD: ${SERVICE_PASSWORD_KIRO_PROXY:-${ADMIN_PASSWORD:-changeme}}
      SERVICE_FQDN_KIRO_PROXY_8080: /
      # Traffic published from the VPS loopback reaches the container over the
      # Docker bridge (not the container's own loopback), so the SSO callback
      # listener must bind 0.0.0.0 to receive it. The port itself is only
      # published on 127.0.0.1 above, so it stays off the public network.
      KIRO_SSO_CALLBACK_BIND: ${KIRO_SSO_CALLBACK_BIND:-0.0.0.0}
    volumes:
      - kiro-proxy-state:/app/state
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  kiro-proxy-state:
