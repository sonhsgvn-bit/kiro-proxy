services:
  kiro-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiro-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATA_DIR: ${DATA_DIR:-/app/state}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ADMIN_PASSWORD: ${SERVICE_PASSWORD_KIRO_PROXY:-${ADMIN_PASSWORD:-changeme}}
      SERVICE_FQDN_KIRO_PROXY_8080: /
    volumes:
      - kiro-proxy-state:/app/state
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  kiro-proxy-state:
