services:
  kiro-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # No host port binding under Coolify: Traefik routes the FQDN to the
    # container's internal port 8080 (see SERVICE_FQDN_KIRO_PROXY_8080).
    # Do NOT add a `ports:` mapping here — it breaks Coolify's Traefik routing
    # (the FQDN label is derived from the service config) and causes Bad Gateway.
    expose:
      - "8080"
    environment:
      DATA_DIR: ${DATA_DIR:-/app/state}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ADMIN_PASSWORD: ${SERVICE_PASSWORD_KIRO_PROXY:-${ADMIN_PASSWORD:-changeme}}
      SERVICE_FQDN_KIRO_PROXY_8080: /
      # Enterprise SSO (Microsoft 365) callback bind host.
      #
      # The hosted-portal sign-in always redirects the browser to the fixed
      # http://localhost:3128 (that redirect_uri is pre-registered by Kiro/Azure
      # and cannot be pointed at the Coolify domain). Setting this to 0.0.0.0 makes
      # the in-container callback listener reachable over the Docker network during
      # the ~10-minute login window, so an SSH tunnel can deliver the callback
      # WITHOUT publishing a host port (which would break Coolify routing).
      #
      # To run the login from your laptop, open a tunnel straight to the container:
      #
      #     CID=$(docker ps -qf name=kiro-proxy)
      #     CIP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' "$CID")
      #     ssh -L 3128:$CIP:3128 user@<VPS-IP>
      #
      # then, with the tunnel open, use the admin panel (via the Coolify domain) ->
      # Add account -> Microsoft 365 -> Start Login. The callback to localhost:3128
      # travels laptop -> SSH -> container, and the token returns. Refresh afterwards
      # goes straight to Microsoft and no longer needs this port.
      KIRO_SSO_CALLBACK_BIND: ${KIRO_SSO_CALLBACK_BIND:-0.0.0.0}
    volumes:
      - kiro-proxy-state:/app/state
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  kiro-proxy-state:
